name: Otomatisasi Pengujian ESP32 MPU6050

# Memicu alur kerja setiap ada push ke branch 'main' atau dipicu manual
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-wokwi-test:
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Mengambil kode terbaru dari repositori GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Langkah 2: Menjalankan Pengujian Wokwi CLI secara otomatis
      - name: Run Wokwi CI Test
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: .
          configPath: 'sensor_MPU5060_test.yaml'