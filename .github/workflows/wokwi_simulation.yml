name: ESP32 Wokwi CI

on: [push, pull_request]

jobs:
  build_and_simulate:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repositori GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build projek menggunakan GitHub Action resmi Espressif
      - name: Build ESP-IDF Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1  # Sesuaikan dengan versi IDF yang kamu pakai
          target: esp32

      # 3. Jalankan simulasi dengan Wokwi setelah file .bin berhasil dibuat
      - name: Simulate with Wokwi
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path_to_project: '.'
          timeout: 5000