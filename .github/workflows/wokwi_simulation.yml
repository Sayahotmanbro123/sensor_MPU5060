version: 1
name: Wokwi Simulation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # PERBAIKAN DI SINI: Menggunakan nama repo resmi yang valid
      - name: Build ESP-IDF Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32

      - name: Run Wokwi CI Simulation
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: '.'
          scenario: 'wokwi_test.yaml'